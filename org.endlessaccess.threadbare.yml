id: org.endlessaccess.threadbare
runtime: org.freedesktop.Platform
runtime-version: '25.08'
base: org.godotengine.godot.BaseApp
base-version: '4.6'
sdk: org.freedesktop.Sdk
command: godot-runner
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
modules:
  - name: threadbare
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/endlessm/threadbare/releases/download/v0.1.11/threadbare-v0.1.11-linux-metadata.tar.gz
        sha256: db7c75a978e788389e9b700681846727244e123b5eaf2e359b255edbb5531c61
        dest-filename: linux-metadata.tar.gz
        x-checker-data:
          type: json
          url: https://api.github.com/repos/endlessm/threadbare/releases/latest
          version-query: .tag_name
          url-query: |
            .assets[] | select(.name | endswith("-linux-metadata.tar.gz")) | .browser_download_url

      - type: file
        url: https://github.com/endlessm/threadbare/releases/download/v0.1.11/threadbare-v0.1.11.pck
        sha256: 6cca9c7aa2971fa5ac8d82b5e5fa0741193661b6879cc6d7614dded081b0668f
        dest-filename: godot-runner.pck
        x-checker-data:
          type: json
          url: https://api.github.com/repos/endlessm/threadbare/releases/latest
          is-main-source: true
          version-query: .tag_name
          url-query: |
            .assets[] | select(.name | endswith(".pck")) | .browser_download_url

    build-commands:
      - install -Dm644 godot-runner.pck ${FLATPAK_DEST}/bin/godot-runner.pck

      - linux/install-metadata
